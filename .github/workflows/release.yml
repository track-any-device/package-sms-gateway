name: Release

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest
    # Skip the bot's own version bump commits to prevent an infinite loop
    if: "!startsWith(github.event.head_commit.message, 'chore: bump version')"
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - name: Get latest version tag
        id: latest
        run: |
          latest=$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-version:refname | head -n1)
          latest=${latest:-v0.0.0}
          echo "version=${latest#v}" >> $GITHUB_OUTPUT

      - name: Calculate next version
        id: next
        run: |
          version="${{ steps.latest.outputs.version }}"
          IFS='.' read -r major minor patch <<< "$version"

          # Only inspect the subject line to avoid matching keywords in the body
          subject=$(git log -1 --format="%s")

          if echo "$subject" | grep -qiE "BREAKING[[:space:]]CHANGE|^[a-z]+(\(.+\))?!:"; then
            new_version="$((major + 1)).0.0"
          elif echo "$subject" | grep -qE "^feat(\(.+\))?:"; then
            new_version="${major}.$((minor + 1)).0"
          else
            new_version="${major}.${minor}.$((patch + 1))"
          fi

          echo "version=$new_version" >> $GITHUB_OUTPUT
          echo "tag=v$new_version" >> $GITHUB_OUTPUT

      - name: Update composer.json
        run: |
          jq --arg v "${{ steps.next.outputs.version }}" '.version = $v' composer.json > composer.json.tmp
          mv composer.json.tmp composer.json

      - name: Commit, tag, and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add composer.json
          git commit -m "chore: bump version to ${{ steps.next.outputs.version }}"
          git tag "${{ steps.next.outputs.tag }}"
          git push origin main
          git push origin "${{ steps.next.outputs.tag }}"

      - name: Create GitHub Release
        run: |
          gh release create "${{ steps.next.outputs.tag }}" \
            --title "${{ steps.next.outputs.tag }}" \
            --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
